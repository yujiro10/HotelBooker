{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10 col-xl-8">
        <h1 class="h2 mb-3 text-center">Nouvelle réservation</h1>
        <form method="post" class="bg-white shadow rounded p-4 p-md-5">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-4">
                <label class="form-label">Chambre</label>
                {{ form.chambre }}
            </div>
            <div class="mb-4">
                <label class="form-label">Date de début</label>
                {{ form.date_debut }}
            </div>
            <div class="mb-4">
                <label class="form-label">Date de fin</label>
                {{ form.date_fin }}
            </div>
            <button class="btn btn-primary btn-lg w-100" type="submit">Enregistrer</button>
        </form>
    </div>
</div>
{% endblock %}
