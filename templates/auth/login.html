{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        <h1 class="h2 mb-3 text-center">Connexion</h1>
        <form method="post" class="bg-white shadow rounded p-4 p-md-5">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nom d’utilisateur</label>
                <input type="text" name="username" class="form-control form-control-lg" autofocus required id="id_username">
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control form-control-lg" required id="id_password">
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">Nom d’utilisateur ou mot de passe incorrect.</div>
            {% endif %}
            <button class="btn btn-primary btn-lg w-100" type="submit">Se connecter</button>
        </form>
    </div>
</div>
{% endblock %}
